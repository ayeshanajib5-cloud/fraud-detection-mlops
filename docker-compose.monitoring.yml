version: "3.8"

services:
  prometheus:
    image: prom/prometheus
    container_name: fraud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: fraud-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus